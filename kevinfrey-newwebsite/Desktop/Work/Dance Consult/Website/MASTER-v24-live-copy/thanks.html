  <style>

    /* Global reset for layout sanity */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #fff7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .subscribe-card {
      position: relative;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(17,17,17,0.08);
      isolation: isolate;
    }
    .page-top-gradient{
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 30;
    }
    .page-top-gradient-bar{
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg,#00CFFF,#3A6DFF,#FF00A8,#FF4D2E,#FFC400,#9CFF00,#00CFFF);
      background-size: 320% 320%;
      animation: move 12s linear infinite;
      box-shadow: 0 0 18px rgba(15,23,42,0.12);
    }
    .page-top-gradient-glow{
      position: absolute;
      top: -140px;
      left: -20%;
      right: -20%;
      height: 320px;
      background: linear-gradient(90deg,#00CFFF,#3A6DFF,#FF00A8,#FF4D2E,#FFC400,#9CFF00,#00CFFF);
      background-size: 320% 320%;
      filter: blur(140px);
      opacity: 0.22;
      border-radius: 60%;
      animation: move 12s linear infinite;
    }
    @media (max-width: 768px) {
      .page-top-gradient-glow{
        height: calc(100vh + 160px);
        max-height: 680px;
        -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85) 55%, rgba(0,0,0,0) 100%);
        mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85) 55%, rgba(0,0,0,0) 100%);
      }
    }
    .subscribe-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(
        90deg,
        #00CFFF,
        #3A6DFF,
        #FF00A8,
        #FF4D2E,
        #FFC400,
        #9CFF00
      );
      background-size: 300% 300%;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: move 8s linear infinite;
      z-index: -1;
    }
    @keyframes move {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subscribe-title { font-size: 26px; font-weight: 700; margin: 0 0 8px; color: #0F172A; }
    .subscribe-subtitle { font-size: 15px; color: #6B7280; margin: 0 0 24px; }
    .subscribe-form { margin: 0 auto 12px; max-width: 480px; }

    .subscribe-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .subscribe-input {
      display: block;
      flex: 1 1 260px;
      min-width: 220px;
      height: 48px;
      padding: 0 16px;
      border: 1px solid #E5E7EB;
      border-radius: 999px;
      font-size: 16px;            /* prevent iOS zoom */
      line-height: 48px;          /* prevent tall oval */
      background: #fff;
      -webkit-appearance: none;   /* normalize iOS */
      appearance: none;
      outline: none;
      transition: border-color .18s ease;
    }
    .subscribe-input:focus { border-color: #3A6DFF; }

    .subscribe-button {
      flex: 0 0 auto;
      height: 48px;
      padding: 0 22px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 999px;
      border: 2px solid transparent;
      background:
        linear-gradient(#fff,#fff) padding-box,
        linear-gradient(90deg,#00CFFF,#3A6DFF,#FF00A8,#FF4D2E,#FFC400,#9CFF00) border-box;
      color: #0F172A;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .2s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .subscribe-button:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,.08); }

    .subscribe-fine { font-size: 12px; color: #6B7280; margin: 10px 0 0; }

    @media (max-width: 640px) {
      .subscribe-card { padding: 28px 20px; }
      .subscribe-inner { flex-direction: column; gap: 12px; }
      .subscribe-input, .subscribe-button { width: 100%; min-width: 0; }
      .subscribe-input { line-height: 48px; }
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* override small bits for the thanks page */
    .subscribe-title { font-size: 28px; }
  </style>

    <div class="page-top-gradient-glow"></div>

  <section class="subscribe-card">
    <h2 class="subscribe-title">You’re In!</h2>
    <p>Thanks for subscribing to 1:1 Dance Consult. Be on the lookout for insights, tools, inspiration, and updates—delivered straight to your inbox.</p>

    <a href="https://calendly.com/d/cv4b-hrp-6zt" class="subscribe-button" style="text-decoration:none; display:inline-block; line-height:48px; text-align:center;">💬 Enter the 1:1 Portal</a>
  </section>

  <script src="assets/js/portal-gate.js"></script>
</body>
