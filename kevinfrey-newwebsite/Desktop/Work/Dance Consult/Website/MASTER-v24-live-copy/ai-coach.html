  <style>
    :root{
      --brand-stops:#00CFFF,#2F80FF,#8A2BE2,#FF00FF,#FF375F,#FF7A00,#FFE500,#00CFFF;
      --brand-gradient:linear-gradient(90deg,var(--brand-stops));
    }
    *{box-sizing:border-box}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      overflow:hidden;
      background:#f9fafc;
      position:relative;
    }
    .page-top-gradient{
      position:fixed;
      top:0;
      left:0;
      right:0;
      pointer-events:none;
      z-index:30;
    }
    .page-top-gradient-bar{
      width:100%;
      height:4px;
      border-radius:999px;
      background:var(--brand-gradient);
      background-size:320% 320%;
      animation:gradientShift 12s ease infinite;
      box-shadow:0 0 18px rgba(15,23,42,0.12);
    }
    .page-top-gradient-glow{
      position:absolute;
      top:-140px;
      left:-20%;
      right:-20%;
      height:320px;
      background:var(--brand-gradient);
      background-size:320% 320%;
      filter:blur(140px);
      opacity:0.22;
      border-radius:60%;
      animation:gradientShift 12s ease infinite;
    }
    @media (max-width:768px){
      .page-top-gradient-glow{
        height:calc(100vh + 160px);
        max-height:680px;
        -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,0.85) 55%, rgba(0,0,0,0) 100%);
        mask-image:linear-gradient(to bottom, rgba(0,0,0,0.85) 55%, rgba(0,0,0,0) 100%);
      }
    }
    .ambient-background{
      position:fixed;
      inset:0;
      background:white;
      z-index:-2;
    }
    .ambient-gradient{
      position:fixed;
      top:-12%;
      bottom:-22%;
      left:-15%;
      right:-15%;
      background:
        radial-gradient(circle at 15% 32%, rgba(0,207,255,0.32), transparent 58%),
        radial-gradient(circle at 80% 26%, rgba(255,0,255,0.28), transparent 55%),
        radial-gradient(circle at 50% 80%, rgba(255,122,0,0.24), transparent 62%),
        radial-gradient(circle at 52% 58%, rgba(80,200,255,0.18), transparent 70%);
      animation:float 16s ease-in-out infinite alternate;
      opacity:0.4;
      filter:blur(22px);
      z-index:-1;
      overflow:hidden;
      pointer-events:none;
    }

    .ambient-gradient::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(249,250,252,0) 0%, rgba(249,250,252,0.88) 100%);
      pointer-events:none;
    }

    .ambient-gradient::after{
      content:'';
      position:absolute;
      inset:-30%;
      background:var(--brand-gradient);
      background-size:200% 200%;
      mix-blend-mode:screen;
      opacity:0.28;
      animation:gradientFlow 22s linear infinite;
      filter:blur(40px);
    }

    .frame{
      height:100vh;
      width:100vw;
      display:grid;
      place-items:center;
      padding:clamp(20px,5vw,36px);
    }

    .widget-shell{
      width:min(520px,90vw);
      align-self:start;
      margin-top:clamp(140px,18vh,220px);
    }

    @media (max-width:640px){
      .widget-shell{
        margin-top:clamp(180px,32vh,280px);
      }
      .ambient-gradient{
        top:10%;
        bottom:-38%;
        opacity:0.32;
        filter:blur(28px);
      }
      .ambient-gradient::before{
        background:linear-gradient(to top, rgba(249,250,252,0) 0%, rgba(249,250,252,0.95) 100%);
      }
    }

    .widget-shell elevenlabs-convai{
      display:block;
      min-height:120px;
    }

    footer{
      position:fixed;
      left:0;
      right:0;
      bottom:20px;
      padding-bottom:0;
      text-align:center;
      font-size:9px;
      color:#94a3b8;
    }

    @keyframes gradientShift{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
    @keyframes float{
      0%{transform:translate3d(0,0,0) scale(1);}
      100%{transform:translate3d(6%,4%,0) scale(1.05);}
    }

    @keyframes gradientFlow{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
  </style>

              keyframes: {

                },
                float: {
                  '0%,100%': { transform: 'translateY(0)' },
                  '50%': { transform: 'translateY(-6px)' }
                },
              },
              animation: {
                gradient: 'gradientShift 12s ease infinite',
                float: 'float 16s ease-in-out infinite',
              },
            }
          }
        }
